name: Build RPM and notify Telegram

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rpm-master
  cancel-in-progress: true

jobs:
  build-and-send:
    runs-on: [self-hosted, linux, x64, whisply-rpm]

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      # Rust is provisioned once on the persistent self-hosted runner.
      - name: Verify Rust toolchain
        run: |
          rustc --version
          cargo --version

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          # A pinned version lets setup-bun restore its cached executable.
          bun-version: 1.3.14

      - name: Locate Bun package cache
        id: bun-cache
        run: echo "dir=$(bun pm cache)" >> "$GITHUB_OUTPUT"

      - name: Restore Bun package cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.bun-cache.outputs.dir }}
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build RPM
        run: bun run tauri build --bundles rpm

      - name: Send RPM to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          test -n "$TELEGRAM_BOT_TOKEN"
          test -n "$TELEGRAM_CHAT_ID"
          rpm_file=$(find src-tauri/target/release/bundle/rpm -type f -name '*.rpm' -print -quit)
          test -n "$rpm_file"
          curl --fail --retry 3 --retry-all-errors \
            --form "chat_id=$TELEGRAM_CHAT_ID" \
            --form "document=@$rpm_file" \
            --form "caption=Whisply RPM — ${GITHUB_SHA::7}" \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument"
